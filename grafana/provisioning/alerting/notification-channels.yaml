apiVersion: 1

contactPoints:
  - orgId: 1
    name: batty-orchestrator-log
    receivers:
      - uid: batty_orchestrator_log
        type: webhook
        disableResolveMessage: false
        settings:
          url: http://127.0.0.1:8787/grafana-alerts
          httpMethod: POST
          title: '{{ template "default.title" . }}'
          message: '{{ template "default.message" . }}'

policies:
  - orgId: 1
    receiver: batty-orchestrator-log
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    # Optional Telegram fan-out:
    # 1. Uncomment the contact point below.
    # 2. Set BATTY_GRAFANA_TELEGRAM_BOT_TOKEN and BATTY_GRAFANA_TELEGRAM_CHAT_ID.
    # 3. Uncomment the route below to forward critical alerts.
