name: batty-dev

workflow_mode: board_first
orchestrator_pane: true
orchestrator_position: left
use_shim: true
use_sdk_mode: true
auto_respawn_on_crash: true
shim_working_state_timeout_secs: 7200

workflow_policy:
  pipeline_starvation_threshold: ~
  auto_merge:
    enabled: true
  claim_ttl:
    default_secs: 86400

board:
  rotation_threshold: 15
  auto_dispatch: true

standup:
  interval_secs: 900
  output_lines: 40

automation:
  timeout_nudges: true
  standups: true
  triage_interventions: true
  review_interventions: true
  owned_task_interventions: true
  manager_dispatch_interventions: true
  architect_utilization_interventions: true
  intervention_idle_grace_secs: 120
  intervention_cooldown_secs: 300

automation_sender: human

layout:
  zones:
    - name: architect
      width_pct: 20
    - name: managers
      width_pct: 20
    - name: engineers
      width_pct: 60

roles:
  - name: human
    role_type: user
    channel: telegram
    channel_config:
      target: "170281556"
      provider: openclaw
      bot_token: "BATTY_TELEGRAM_BOT_TOKEN_REDACTED"
      allowed_user_ids: [170281556]
    talks_to: [architect]

  - name: human-discord
    role_type: user
    channel: discord
    channel_config:
      bot_token: "BATTY_DISCORD_BOT_TOKEN_REDACTED"
      commands_channel_id: "1490930426812829716"
      events_channel_id: "1490930323608047647"
      agents_channel_id: "1490930375822676070"
      allowed_user_ids: [170281556]
    talks_to: [architect]

  - name: architect
    role_type: architect
    agent: claude 
    instances: 1
    prompt: batty_architect.md
    posture: orchestrator
    model_class: frontier
    talks_to: [human, manager]
    nudge_interval_secs: 300
    standup_interval_secs: 1800
    owns: ["planning/**", "docs/**", "CLAUDE.md"]

  - name: manager
    role_type: manager
    agent: claude
    instances: 1
    prompt: batty_manager.md
    posture: orchestrator
    model_class: frontier
    talks_to: [architect, engineer]
    nudge_interval_secs: 300
    standup_interval_secs: 1800

  - name: engineer
    role_type: engineer
    agent: claude
    instances: 3
    prompt: batty_engineer.md
    posture: deep_worker
    model_class: standard
    talks_to: [manager]
    nudge_interval_secs: 300
    use_worktrees: true
